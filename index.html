<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator - Nano Banana</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="//libtl.com/sdk.js" data-zone="9625198" data-sdk="show_9625198"></script>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #333333;
            --text-secondary: #666666;
            --accent: #007bff;
            --border: #e0e0e0;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .dark {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --accent: #4dabf7;
            --border: #404040;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            transition: background 0.3s, color 0.3s;
        }
        #app {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        #theme-toggle {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        #theme-toggle:hover {
            opacity: 0.9;
        }
        nav {
            display: flex;
            background: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }
        nav button {
            flex: 1;
            background: none;
            border: none;
            padding: 12px 20px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }
        nav button.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            background: var(--bg-primary);
        }
        .tab {
            display: none;
            flex-direction: column;
            gap: 15px;
        }
        .tab.active {
            display: flex;
        }
        input[type="file"] {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-secondary);
        }
        textarea {
            resize: vertical;
            min-height: 100px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        select {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        button:not(nav button) {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 16px;
        }
        button:not(nav button):hover {
            opacity: 0.9;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #output {
            margin-top: 20px;
            text-align: center;
        }
        #result {
            max-width: 100%;
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: none;
        }
        #output-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }
        #output-buttons button {
            flex: 1;
            max-width: 150px;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
        }
        @media (max-width: 480px) {
            #app {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>AI Image Generator</h1>
            <button id="theme-toggle">🌙 Dark Mode</button>
        </header>
        <nav>
            <button class="tab-btn active" data-tab="t2i">Text to Image</button>
            <button class="tab-btn" data-tab="i2i">Image to Image</button>
            <button class="tab-btn" data-tab="passport">Passport Photo</button>
            <button class="tab-btn" data-tab="editor">Image Editor</button>
        </nav>
        <div id="content">
            <!-- Text to Image -->
            <div class="tab active" id="t2i">
                <label>Reference Images (optional, up to 3):</label>
                <input type="file" multiple accept="image/*" id="refs-t2i">
                <label>Prompt:</label>
                <textarea id="prompt-t2i" placeholder="Describe the image you want to generate..."></textarea>
                <button onclick="generate('t2i')">Generate</button>
            </div>

            <!-- Image to Image -->
            <div class="tab" id="i2i">
                <label>Reference Images (at least 1, up to 3):</label>
                <input type="file" multiple accept="image/*" id="refs-i2i">
                <label>Prompt:</label>
                <textarea id="prompt-i2i" placeholder="Describe changes or style..."></textarea>
                <button onclick="generate('i2i')">Generate</button>
            </div>

            <!-- Passport Photo -->
            <div class="tab" id="passport">
                <label>Reference Images (multiple for headshot generation):</label>
                <input type="file" multiple accept="image/*" id="refs-passport">
                <label>Additional Prompt (optional):</label>
                <textarea id="prompt-passport" placeholder="E.g., professional headshot..."></textarea>
                <label>Background:</label>
                <select id="bg-select">
                    <option value="white solid background">White Solid</option>
                    <option value="blue solid background">Blue Solid</option>
                    <option value="light gray solid background">Light Gray Solid</option>
                    <option value="subtle pattern background">Subtle Pattern</option>
                </select>
                <button onclick="generate('passport')">Generate Passport Photo</button>
            </div>

            <!-- Image Editor -->
            <div class="tab" id="editor">
                <label>Upload Image to Edit:</label>
                <input type="file" multiple accept="image/*" id="refs-editor">
                <label>AI Edit Prompt:</label>
                <textarea id="prompt-editor" placeholder="E.g., add hat, change background, or convert to passport..."></textarea>
                <label>Convert to Passport? (include in prompt if yes)</label>
                <input type="checkbox" id="to-passport">
                <button onclick="generate('editor')">Edit Image</button>
            </div>
        </div>
        <div id="output">
            <div id="loading" class="loading" style="display:none;">Generating image...</div>
            <img id="result" alt="Generated Image">
            <div id="output-buttons" style="display:none;">
                <button id="upscale-btn" onclick="upscaleImage()">Upscale</button>
                <button id="download-btn" onclick="downloadWithAds()">Download (Watch 3 Ads)</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyBboVl5sj3lrHtz84CMJpJDRTpA9Y9SS-8';
        const MODEL = 'gemini-2.5-flash-image-preview';
        let currentImageBase64 = null;
        let adsWatchedForDownload = 0;
        const REQUIRED_ADS = 3;

        // Telegram WebApp Init
        if (window.Telegram && window.Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        }

        // Theme Toggle
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            themeToggle.textContent = document.body.classList.contains('dark') ? '☀️ Light Mode' : '🌙 Dark Mode';
        });

        // Tab Switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                document.getElementById(e.target.dataset.tab).classList.add('active');
            });
        });

        // File to Base64 Helper
        async function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    const base64 = reader.result.split(',')[1]; // Remove data:image/...;base64,
                    const mimeType = reader.result.match(/data:(.*);base64/)[1];
                    resolve({ mimeType, data: base64 });
                };
                reader.onerror = error => reject(error);
            });
        }

        // Generate Function
        async function generate(type) {
            const refsInput = document.getElementById(`refs-${type === 'passport' ? 'passport' : type === 'editor' ? 'editor' : type === 'i2i' ? 'i2i' : 't2i'}`);
            const promptInput = document.getElementById(`prompt-${type}`);
            const files = Array.from(refsInput.files);
            if (type !== 't2i' && files.length === 0) {
                alert('Please upload at least one reference image.');
                return;
            }
            if (files.length > 3) {
                alert('Maximum 3 reference images allowed.');
                return;
            }
            if (!promptInput.value.trim()) {
                alert('Please enter a prompt.');
                return;
            }

            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            document.getElementById('result').style.display = 'none';
            document.getElementById('output-buttons').style.display = 'none';

            try {
                let contents = [{ text: promptInput.value.trim() }];
                for (const file of files) {
                    const imgData = await fileToBase64(file);
                    contents.push({ inline_data: imgData });
                }

                // Type-specific modifications
                let fullPrompt = promptInput.value.trim();
                if (type === 'passport') {
                    const bgSelect = document.getElementById('bg-select');
                    fullPrompt += `, professional passport headshot from references, ${bgSelect.value}`;
                    contents[0].text = fullPrompt;
                } else if (type === 'editor') {
                    const toPassport = document.getElementById('to-passport').checked;
                    if (toPassport) {
                        fullPrompt += ', convert to professional passport photo with white background';
                    }
                    contents[0].text = `Edit the image: ${fullPrompt}`;
                } else if (type === 'i2i') {
                    contents[0].text = `Generate variation or edit based on references: ${fullPrompt}`;
                }

                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents })
                    }
                );

                if (!response.ok) {
                    throw new Error(`API error: ${response.statusText}`);
                }

                const data = await response.json();
                if (data.candidates && data.candidates[0] && data.candidates[0].content.parts[0].inline_data) {
                    currentImageBase64 = data.candidates[0].content.parts[0].inline_data.data;
                    const img = document.getElementById('result');
                    img.src = `data:image/png;base64,${currentImageBase64}`;
                    img.style.display = 'block';
                    document.getElementById('output-buttons').style.display = 'flex';
                    adsWatchedForDownload = 0; // Reset ads for new image
                } else {
                    alert('Generation failed. Please try again.');
                }
            } catch (error) {
                console.error(error);
                alert('Error generating image: ' + error.message);
            } finally {
                loading.style.display = 'none';
            }
        }

        // Upscale Function
        async function upscaleImage() {
            if (!currentImageBase64) return;

            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            document.getElementById('result').style.display = 'none';

            try {
                const contents = [
                    { text: 'Generate a high-resolution upscaled version of the provided image, maintaining all details and quality.' },
                    { inline_data: { mime_type: 'image/png', data: currentImageBase64 } }
                ];

                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents })
                    }
                );

                if (!response.ok) {
                    throw new Error(`API error: ${response.statusText}`);
                }

                const data = await response.json();
                if (data.candidates && data.candidates[0] && data.candidates[0].content.parts[0].inline_data) {
                    currentImageBase64 = data.candidates[0].content.parts[0].inline_data.data;
                    const img = document.getElementById('result');
                    img.src = `data:image/png;base64,${currentImageBase64}`;
                    img.style.display = 'block';
                } else {
                    alert('Upscale failed. Please try again.');
                }
            } catch (error) {
                console.error(error);
                alert('Error upscaling image: ' + error.message);
            } finally {
                loading.style.display = 'none';
            }
        }

        // Download with Ads
        async function downloadWithAds() {
            if (adsWatchedForDownload >= REQUIRED_ADS) {
                downloadImage();
                return;
            }

            try {
                for (let i = adsWatchedForDownload; i < REQUIRED_ADS; i++) {
                    await show_9625198();
                    adsWatchedForDownload++;
                }
                downloadImage();
            } catch (error) {
                console.error('Ad error:', error);
                alert('Ad playback interrupted. Please try again.');
                adsWatchedForDownload = 0;
            }
        }

        function downloadImage() {
            const a = document.createElement('a');
            a.href = `data:image/png;base64,${currentImageBase64}`;
            a.download = 'generated-image.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
